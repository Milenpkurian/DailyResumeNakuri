name: Daily Resume Update

on:
  schedule:
    # 3:30 AM UTC is 9:00 AM IST
    - cron: '30 3 * * *'
  workflow_dispatch: # Allows manual triggering for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Uses latest 3.x release

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updateDaily.py
        env:
          NAUKRI_USERNAME: ${{ secrets.NAUKRI_USERNAME }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          FILE_ID: ${{ secrets.FILE_ID }}
          FORM_KEY: ${{ secrets.FORM_KEY }}
          FILENAME: ${{ secrets.FILENAME }}
          NAUKRI_DEBUG: ${{ secrets.NAUKRI_DEBUG }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python updateDaily.py
